<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox 数据统计页</title>
  <link rel="stylesheet" href="flexbox.css">
</head>
<body>
  <header class="page-header">
    <h1>销售统计面板</h1>
    <p>使用 Flexbox 布局展示关键指标和统计卡片。</p>
  </header>

  <nav class="nav">
    <a href="#">仪表盘</a>
    <a href="#">报告</a>
    <a href="#">分析</a>
    <a href="#">设置</a>
  </nav>

  <main class="stats-grid">
    <section class="card">
      <h2>本周销售</h2>
      <p class="value">¥128,760</p>
      <p class="meta">较上周增长 12%</p>
    </section>
    <section class="card">
      <h2>新增用户</h2>
      <p class="value">5,420</p>
      <p class="meta">注册量稳定增长</p>
    </section>
    <section class="card">
      <h2>转化率</h2>
      <p class="value">8.4%</p>
      <p class="meta">比上月提高 1.1%</p>
    </section>
    <section class="card">
      <h2>客户满意度</h2>
      <p class="value">92%</p>
      <p class="meta">评价良好</p>
    </section>
  </main>
</body>
</html>
